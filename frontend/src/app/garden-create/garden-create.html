<div class="create-page">
  <h1>Create Garden</h1>
  <form [formRoot]="gardenForm" class="form">
    <label>
      Garden Name
      <input
        type="text"
        [formField]="gardenForm.name"
        placeholder="e.g. Backyard Garden"
      />
    </label>
    @if (gardenForm.name().touched() && gardenForm.name().invalid()) {
      <p class="error">{{ gardenForm.name().errors()[0]?.message }}</p>
    }

    <label>
      Description (optional)
      <textarea
        [formField]="gardenForm.description"
        rows="2"
        placeholder="Notes about this garden"
      ></textarea>
    </label>

    <div class="row">
      <label>
        Width (metres)
        <input type="number" [formField]="gardenForm.widthM" step="0.5" />
      </label>
      <label>
        Length (metres)
        <input type="number" [formField]="gardenForm.lengthM" step="0.5" />
      </label>
    </div>

    @if (gardenForm.widthM().value() > 0 && gardenForm.lengthM().value() > 0) {
      <div class="preview">
        <p>
          Preview: {{ gardenForm.widthM().value() }}m &times;
          {{ gardenForm.lengthM().value() }}m
        </p>
        <svg
          [attr.viewBox]="'0 0 ' + gardenForm.widthM().value() + ' ' + gardenForm.lengthM().value()"
          preserveAspectRatio="xMidYMid meet"
        >
          <rect
            [attr.width]="gardenForm.widthM().value()"
            [attr.height]="gardenForm.lengthM().value()"
            fill="#e8f5e9"
            stroke="#4caf50"
            stroke-width="0.05"
          />
        </svg>
      </div>
    }

    <div class="actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">
        Cancel
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="gardenForm().invalid()"
      >
        Create
      </button>
    </div>
  </form>
</div>
