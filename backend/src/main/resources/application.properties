quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:garden}
quarkus.datasource.password=${DB_PASSWORD:garden_secret}
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/garden_planner}

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog.xml

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=https://garden.lohmann.cloud
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# REST path prefix
quarkus.rest.path=/api

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# Google login. Set the OAuth 2.0 Web client ID here so the backend can
# verify the audience of incoming Google ID tokens. Leave blank to skip
# the audience check (useful in local development).
auth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
