services:
  postgres:
    image: postgres:16-alpine
    container_name: garden-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garden_secret}
      POSTGRES_DB: ${POSTGRES_DB:-garden_planner}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-garden}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: garden-planner-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@garden.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
